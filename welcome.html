<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }
        
        header {
            margin-bottom: 30px;
        }
        
        h1 {
            color: #6e8efb;
            font-size: 2.8rem;
            margin-bottom: 15px;
        }
        
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #555;
        }
        
        .highlight {
            color: #a777e3;
            font-weight: 600;
        }
        
        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .feature {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            flex: 1;
            min-width: 200px;
            transition: transform 0.3s ease;
        }
        
        .feature:hover {
            transform: translateY(-5px);
        }
        
        .feature h3 {
            color: #6e8efb;
            margin-bottom: 10px;
        }
        
        .cta-button {
            display: inline-block;
            background: linear-gradient(to right, #6e8efb, #a777e3);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        
        footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>欢迎访问我们的网站</h1>
            <p>很高兴您来到这里！这是一个<span class="highlight">简洁而美观</span>的欢迎界面，采用现代设计风格，完全响应式布局。</p>
        </header>
        
        <div class="features">
            <div class="feature">
                <h3>响应式设计</h3>
                <p>在各种设备上都能完美展示，提供一致的用户体验。</p>
            </div>
            <div class="feature">
                <h3>现代风格</h3>
                <p>采用最新的设计趋势，创造愉悦的视觉体验。</p>
            </div>
            <div class="feature">
                <h3>用户友好</h3>
                <p>简洁直观的界面，让您轻松找到所需内容。</p>
            </div>
        </div>
        
        <p>开始探索我们的网站，发现更多精彩内容！</p>
        
        <a href="#" class="cta-button">开始探索</a>
    </div>
    
    <footer>
        <p>© 2023 欢迎界面示例. 所有权利保留.</p>
    </footer>
</body>
</html>
